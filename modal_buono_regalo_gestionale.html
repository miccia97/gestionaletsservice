

<!-- MODAL BUONO REGALO WIZARD ADVANCED -->
<div class="modal-overlay" id="buonoRegaloModal" style="display:none;">
  <div class="modal-content">
    <div class="modal-header">
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;">
        <div style="background:#22c55e;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;">
          <i class="fas fa-gift" style="color:#fff;font-size:1.5rem;"></i>
        </div>
        <h2 style="color:#fff;font-size:1.7rem;font-weight:700;margin:0;">Nuovo Buono Regalo</h2>
      </div>
      <button type="button" class="close-button" onclick="closeBuonoRegaloModal()">&times;</button>
    </div>
    <!-- Wizard Step Indicator -->
    <div class="wizard-steps">
      <div class="wizard-step active">
        <i class="fas fa-ticket-alt"></i>
        <span>Dettagli</span>
      </div>
      <div class="wizard-step">
        <i class="fas fa-user"></i>
        <span>Destinatario</span>
      </div>
      <div class="wizard-step">
        <i class="fas fa-check-circle"></i>
        <span>Conferma</span>
      </div>
    </div>
    <div class="wizard-progress"><div class="wizard-progress-bar" style="width:33%"></div></div>
    <form method="POST" action="" id="buono-regalo-form">
      <input type="hidden" name="form_type" value="buono_regalo">
      <div class="modal-body">
        <div class="card-section">
          <div class="section-title">
            <i class="fas fa-ticket-alt" style="color:#22c55e;margin-right:8px;"></i> DETTAGLI BUONO REGALO
          </div>
          <div class="form-row">
            <div class="form-group floating-label">
              <input type="number" id="modal_valore" name="valore" step="0.01" min="0" required placeholder=" ">
              <label for="modal_valore">Valore Buono (€) *</label>
            </div>
            <div class="form-group floating-label" style="position:relative;">
              <input type="text" id="modal_codice" name="codice_buono" readonly required placeholder=" ">
              <label for="modal_codice">Codice Buono *</label>
              <button type="button" class="copy-btn" onclick="copyBuonoCode()" title="Copia codice" style="position:absolute;top:50%;right:8px;transform:translateY(-50%);">
                <i class="fas fa-copy"></i>
              </button>
              <div id="modal-copy-message" class="copy-message">Copiato!</div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group floating-label">
              <input type="text" id="modal_destinatario" name="destinatario" placeholder=" ">
              <label for="modal_destinatario">Destinatario</label>
            </div>
            <div class="form-group floating-label">
              <input type="date" id="modal_data_scadenza" name="data_scadenza" placeholder=" ">
              <label for="modal_data_scadenza">Data Scadenza</label>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group floating-label" style="width:100%;">
              <textarea id="modal_mittente_note" name="mittente_note" rows="3" placeholder=" "></textarea>
              <label for="modal_mittente_note">Mittente / Note</label>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group floating-label" style="width:100%;">
              <select id="modal_stato" name="stato_buono" required>
                <option value="Attivo">Attivo</option>
                <option value="Usato">Usato</option>
                <option value="Scaduto">Scaduto</option>
              </select>
              <label for="modal_stato">Stato</label>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="submit" class="save-button">Crea Buono</button>
      </div>
    </form>
  </div>
</div>

<style>
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(34,197,94,0.08);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.modal-content {
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 4px 24px rgba(34,197,94,0.10);
  width: 520px;
  max-width: 95vw;
  padding: 0 0 32px 0;
  position: relative;
  border: 1px solid #e5e7eb;
}
.modal-header {
  background: #22c55e;
  border-radius: 18px 18px 0 0;
  padding: 22px 0 16px 0;
  text-align: center;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.close-button {
  position: absolute;
  top: 12px;
  right: 18px;
  background: none;
  border: none;
  font-size: 2rem;
  color: #fff;
  cursor: pointer;
}
.wizard-steps {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #f8fafc;
  border-bottom: 1px solid #e5e7eb;
  padding: 18px 28px 0 28px;
  margin-bottom: 0;
}
.wizard-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 0.98rem;
  color: #94a3b8;
  font-weight: 600;
}
.wizard-step.active {
  color: #22c55e;
}
.wizard-step i {
  font-size: 1.3rem;
  margin-bottom: 4px;
}
.wizard-progress {
  width: 100%;
  height: 6px;
  background: #e5e7eb;
  border-radius: 6px;
  margin: 0 0 18px 0;
  overflow: hidden;
}
.wizard-progress-bar {
  height: 100%;
  background: #22c55e;
  border-radius: 6px;
  transition: width 0.3s;
}
.modal-body {
  padding: 24px 28px 0 28px;
}
.card-section {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(34,197,94,0.08);
  padding: 24px 18px 18px 18px;
  margin-bottom: 18px;
  border: 1px solid #e5e7eb;
}
.section-title {
  font-size: 1.1rem;
  font-weight: 600;
  color: #22c55e;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
}
.form-row {
  display: flex;
  gap: 18px;
  margin-bottom: 18px;
}
.form-group {
  display: flex;
  flex-direction: column;
  position: relative;
  flex: 1;
}
.floating-label input,
.floating-label textarea,
.floating-label select {
  border: 1.5px solid #e5e7eb;
  border-radius: 8px;
  padding: 14px 12px 14px 12px;
  font-size: 1.08rem;
  font-family: 'Inter', Arial, sans-serif;
  background: #f8fafc;
  color: #222;
  outline: none;
  transition: border-color 0.2s;
}
.floating-label input:focus,
.floating-label textarea:focus,
.floating-label select:focus {
  border-color: #22c55e;
}
.floating-label label {
  position: absolute;
  left: 12px;
  top: 14px;
  color: #94a3b8;
  font-size: 1rem;
  pointer-events: none;
  transition: all 0.2s;
  background: transparent;
}
.floating-label input:not(:placeholder-shown),
.floating-label input:focus,
.floating-label textarea:not(:placeholder-shown),
.floating-label textarea:focus,
.floating-label select:valid {
  background: #f8fafc;
}
.floating-label input:not(:placeholder-shown) + label,
.floating-label input:focus + label,
.floating-label textarea:not(:placeholder-shown) + label,
.floating-label textarea:focus + label,
.floating-label select:valid + label {
  top: -10px;
  left: 8px;
  font-size: 0.85rem;
  color: #22c55e;
  background: #fff;
  padding: 0 4px;
}
.copy-btn {
  background: #22c55e;
  border: none;
  border-radius: 8px;
  padding: 8px 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  transition: background 0.2s;
}
.copy-btn:hover {
  background: #16a34a;
}
.modal-footer {
  padding: 0 28px 0 28px;
  margin-top: 18px;
}
.save-button {
  background: #22c55e;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 1.18rem;
  font-weight: 700;
  padding: 12px 0;
  width: 100%;
  cursor: pointer;
  transition: background 0.2s;
}
.save-button:hover {
  background: #16a34a;
}
.copy-message {
  color: #22c55e;
  font-size: 0.98rem;
  margin-top: 4px;
  display: none;
}
</style>

<script>
function closeBuonoRegaloModal() {
  document.getElementById('buonoRegaloModal').style.display = 'none';
}
function copyBuonoCode() {
  var input = document.getElementById('modal_codice');
  input.select();
  input.setSelectionRange(0, 99999);
  document.execCommand('copy');
  var msg = document.getElementById('modal-copy-message');
  msg.style.display = 'block';
  setTimeout(function(){ msg.style.display = 'none'; }, 1200);
}
</script>
