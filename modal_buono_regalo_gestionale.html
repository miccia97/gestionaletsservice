<!-- MODAL BUONO REGALO - STILE GESTIONALE -->
<div class="popup-overlay" id="buonoRegaloModal" style="display:none;">
  <div class="popup-content">
    <div class="popup-header">
      <h2>Nuovo Buono Regalo</h2>
      <button type="button" class="close-btn" id="close-buono-regalo-modal-btn">&times;</button>
    </div>
    <form method="POST" action="" id="buono-regalo-form">
      <input type="hidden" name="form_type" value="buono_regalo">
      <div class="popup-body">
        <div class="form-grid">
          <div class="form-group full-width">
            <label for="modal_valore">Valore Buono (€) *</label>
            <input type="number" id="modal_valore" name="valore" step="0.01" min="0" required>
          </div>
          <div class="form-group full-width">
            <label for="modal_codice">Codice Buono *</label>
            <div class="code-input-group">
              <input type="text" id="modal_codice" name="codice_buono" readonly required placeholder="Generato automaticamente...">
              <button type="button" id="modal-copy-code-btn" class="copy-btn" title="Copia codice">
                <i class="fas fa-copy"></i>
              </button>
            </div>
            <div id="modal-copy-message" class="copy-message">Copiato!</div>
          </div>
          <div class="form-group">
            <label for="modal_destinatario">Destinatario</label>
            <input type="text" id="modal_destinatario" name="destinatario" placeholder="Nome del destinatario (opzionale)">
          </div>
          <div class="form-group">
            <label for="modal_data_scadenza">Data Scadenza</label>
            <input type="date" id="modal_data_scadenza" name="data_scadenza">
          </div>
          <div class="form-group full-width">
            <label for="modal_mittente_note">Mittente / Note</label>
            <textarea id="modal_mittente_note" name="mittente_note" rows="3" placeholder="Chi ha fatto il regalo o note aggiuntive..."></textarea>
          </div>
          <div class="form-group">
            <label for="modal_stato">Stato</label>
            <select id="modal_stato" name="stato_buono">
              <option value="Attivo">Attivo</option>
              <option value="Usato">Usato</option>
              <option value="Scaduto">Scaduto</option>
            </select>
          </div>
        </div>
      </div>
      <div class="popup-footer">
        <button type="submit" class="popup-btn submit">Crea Buono</button>
      </div>
    </form>
  </div>
</div>
