<!DOCTYPE html>
<html>
<head>
<title>Test Tabs</title>
<style>
.overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center;
    z-index: 9999;
}
.modal {
    background: white; border-radius: 12px; width: 800px; max-height: 90vh;
    display: flex; flex-direction: column; overflow: hidden;
}
.modal-header {
    padding: 1rem 2rem; background: #22c55e; color: white; font-size: 1.2rem;
}
.tab-buttons {
    display: flex; gap: 10px; padding: 1rem 2rem; background: #f8fafc;
    position: relative; z-index: 10;
}
.tab-button {
    padding: 0.75rem 1.5rem; cursor: pointer; border: none;
    background: white; border-radius: 12px; font-weight: 600; font-size: 0.85rem;
}
.tab-button.active {
    color: white; background: #22c55e;
}
.tab-content { display: none; padding: 2rem; }
.tab-content.active { display: block; }
form { flex: 1; overflow-y: auto; padding: 0; }
</style>
</head>
<body>
<h2>Test Tab Switching - Clicca i bottoni sotto</h2>
<div class="overlay">
    <div class="modal">
        <div class="modal-header">Test Modal</div>
        <div class="tab-buttons">
            <button type="button" class="tab-button active" onclick="switchTab('anagrafe')">👤 Anagrafe</button>
            <button type="button" class="tab-button" onclick="switchTab('articoli')">📦 Articoli</button>
            <button type="button" class="tab-button" onclick="switchTab('scheda')">📋 Scheda</button>
        </div>
        <form>
            <div id="anagrafeTab" class="tab-content active">
                <h3>TAB ANAGRAFE</h3>
                <p>Questo è il contenuto Anagrafe</p>
                <input type="text" value="Nome test">
            </div>
            <div id="articoliTab" class="tab-content">
                <h3>TAB ARTICOLI</h3>
                <p>Questo è il contenuto Articoli</p>
                <input type="text" value="Articolo test">
            </div>
            <div id="schedaTab" class="tab-content">
                <h3>TAB SCHEDA</h3>
                <p>Questo è il contenuto Scheda</p>
                <input type="text" value="Scheda test">
            </div>
        </form>
    </div>
</div>

<script>
function switchTab(name) {
    // Reset all
    document.querySelectorAll('.tab-button').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); t.style.display = 'none'; });
    // Activate
    event.target.classList.add('active');
    var tab = document.getElementById(name + 'Tab');
    if (tab) { tab.classList.add('active'); tab.style.display = 'block'; }
}
</script>
</body>
</html>
